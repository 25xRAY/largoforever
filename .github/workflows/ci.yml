name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: largo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d largo_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/largo_test
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXTAUTH_SECRET: ci-nextauth-secret-min-32-chars-long-value-here

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Database schema
        run: npx prisma db push

      - name: Seed database
        run: npm run db:seed

      - name: Typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: Unit & API tests
        run: npm test -- --ci --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
        if: always()

      - name: Next.js build
        run: npm run build:verify

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: End-to-end tests
        run: npm run test:e2e
        env:
          CI: true
